{% load i18n %}
{% load account %}
{% load static %}
<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Sent - BlessBeats</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background: #0f0008; color: white; height: 100vh; overflow: hidden; }
        .auth-page { display: flex; height: 100vh; }
        .auth-left {
            flex: 1.2;
            background: radial-gradient(circle at 20% 20%, rgba(212, 0, 107, 0.25) 0%, transparent 50%),
                        linear-gradient(135deg, #1a0010, #3a0028);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 60px; position: relative; overflow: hidden;
        }
        .brand-logo { width: 80px; height: 80px; background: linear-gradient(135deg, #d4006b, #7d0055); border-radius: 24px; display: flex; align-items: center; justify-content: center; margin-bottom: 30px; }
        .brand-name { font-size: 3.5rem; font-weight: 800; background: linear-gradient(to bottom, #fff, rgba(255,255,255,0.5)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .auth-right { flex: 1; background: rgba(15, 0, 8, 0.95); border-left: 1px solid rgba(255,255,255,0.06); display: flex; align-items: center; justify-content: center; padding: 80px 60px; }
        .auth-form-box { width: 100%; max-width: 420px; text-align: center; }
        .auth-form-box h2 { font-size: 2.2rem; font-weight: 800; margin-bottom: 15px; }
        .auth-form-box p { color: rgba(255,255,255,0.6); margin-bottom: 40px; font-size: 1.1rem; line-height: 1.6; }
        
        .icon-panel { width: 100px; height: 100px; background: rgba(212, 0, 107, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 30px; border: 1px solid rgba(212, 0, 107, 0.3); }
        .btn-submit { width: 100%; padding: 18px; background: linear-gradient(135deg, #d4006b, #7d0055); border: none; border-radius: 16px; color: white; font-size: 1.1rem; font-weight: 700; cursor: pointer; transition: all 0.3s; box-shadow: 0 10px 30px rgba(212, 0, 107, 0.35); text-decoration: none; display: block; }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 15px 40px rgba(212, 0, 107, 0.5); }

        @media (max-width: 900px) { .auth-left { display: none; } .auth-right { padding: 40px 24px; background: linear-gradient(135deg, #1a0010, #3a0028); } }
    </style>
</head>
<body>
<div class="auth-page">
    <div class="auth-left">
        <div class="brand-name">BlessBeats</div>
    </div>
    <div class="auth-right">
        <div class="auth-form-box">
            <div class="icon-panel"><i data-lucide="mail-check" style="color:#d4006b; width:45px; height:45px;"></i></div>
            <h2>{% trans "Password Reset" %}</h2>
            <p>{% trans "We have sent you an e-mail. Please contact us if you do not receive it within a few minutes." %}</p>
            <a href="{% url 'account_login' %}" class="btn-submit">Return to Sign In</a>
        </div>
    </div>
</div>
<script>lucide.createIcons();</script>
</body>
</html>
